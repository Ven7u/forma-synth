name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build macOS universal app bundle
    runs-on: macos-latest   # ARM runner (M1); cross-compiles to Intel via Apple SDK

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Build — Apple Silicon
        run: cargo build --release --target aarch64-apple-darwin -p forma

      - name: Build — Intel
        run: cargo build --release --target x86_64-apple-darwin -p forma

      - name: Bundle .app
        # cargo-bundle re-runs `cargo build` for the host arch and writes
        # the single-arch binary into Forma.app. We replace it with a
        # universal binary in the next step.
        run: cargo bundle --release -p forma

      - name: Replace bundle binary with universal (ARM + Intel) via lipo
        run: |
          lipo -create -output target/release/bundle/osx/Forma.app/Contents/MacOS/forma \
            target/aarch64-apple-darwin/release/forma \
            target/x86_64-apple-darwin/release/forma
          lipo -info target/release/bundle/osx/Forma.app/Contents/MacOS/forma
          file target/release/bundle/osx/Forma.app/Contents/MacOS/forma

      - name: Ad-hoc sign the app bundle
        # lipo invalidates the binary signature; re-sign with ad-hoc (-) so
        # macOS does not report "damaged" when Homebrew removes quarantine.
        run: codesign --force --deep --sign - target/release/bundle/osx/Forma.app

      - name: Zip bundle
        run: |
          cd target/release/bundle/osx
          zip -r "Forma-${{ github.ref_name }}-macos-universal.zip" "Forma.app"
          mv "Forma-${{ github.ref_name }}-macos-universal.zip" "$GITHUB_WORKSPACE/"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        # create-dmg exits 2 when no code-signing identity is present — the DMG
        # is still valid, so we treat exit 2 as success.
        run: |
          create-dmg \
            --volname "Forma ${{ github.ref_name }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Forma.app" 150 185 \
            --hide-extension "Forma.app" \
            --app-drop-link 450 185 \
            "Forma-${{ github.ref_name }}-macos-universal.dmg" \
            "target/release/bundle/osx/" || test $? -eq 2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Forma ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          files: |
            Forma-${{ github.ref_name }}-macos-universal.dmg
            Forma-${{ github.ref_name }}-macos-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
